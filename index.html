<!DOCTYPE html>
<html lang="en" translate="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Dash Notes — A private thinking space for fast minds." />
  <title>Dash Notes</title>
  <link rel="icon" type="image/png" href="assets/favicon.png" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #080b1a;
    }

    .cover-wrap {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: max(48px, env(safe-area-inset-bottom));
    }

    .cover-image {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    .enter-btn {
      position: relative;
      z-index: 10;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 1.5px solid rgba(0, 229, 212, 0.5);
      background: rgba(8, 11, 26, 0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.25s ease;
    }

    .enter-btn:hover,
    .enter-btn:focus {
      background: rgba(0, 229, 212, 0.15);
      border-color: rgba(0, 229, 212, 0.9);
      transform: scale(1.06);
      outline: none;
    }

    .enter-btn svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: #00e5d4;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
  </style>
</head>
<body>

  <img
    src="assets/dash-notes-cover.png"
    alt="Dash Notes"
    class="cover-image"
    onerror="this.style.background='#080b1a'" />

  <div class="cover-wrap">
    <a href="app.html" class="enter-btn" aria-label="Enter Dash Notes">
      <svg viewBox="0 0 24 24">
        <polyline points="9 18 15 12 9 6"></polyline>
      </svg>
    </a>
  </div>

</body>
</html>
